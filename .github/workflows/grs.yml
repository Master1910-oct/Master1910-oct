name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create profile directory
        run: mkdir -p profile

      - name: Download trophy card
        run: |
          curl -s -o profile/trophy.svg \
            "https://github-profile-trophy.vercel.app/?username=Master1910-oct&theme=tokyonight&no-frame=true&no-bg=true&row=1&column=6&margin-w=8"
          if head -1 profile/trophy.svg | grep -q "<svg"; then
            echo "✅ trophy.svg is valid"
          else
            echo "⚠️ trophy.svg invalid, removing"
            rm -f profile/trophy.svg
          fi

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/
          git diff --staged --quiet || git commit -m "chore: update readme cards"
          git push || echo "Nothing to push"
